<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make a Prediction</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 32px 16px;
            font-family: Arial, sans-serif;
            color: #172033;
            background: linear-gradient(135deg, #e0f2fe, #eef2ff);
        }
        .container { max-width: 720px; margin: auto; }
        .card {
            padding: 32px;
            background: rgba(255, 255, 255, .96);
            border-radius: 20px;
            box-shadow: 0 20px 55px rgba(30, 64, 175, .15);
        }
        .back { color: #4f46e5; text-decoration: none; font-weight: bold; }
        h1 { margin: 20px 0 8px; font-size: 2rem; }
        .intro { margin-bottom: 26px; color: #64748b; }
        form { display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; }
        .field { display: flex; flex-direction: column; gap: 7px; }
        label { font-size: .9rem; font-weight: bold; }
        select, input {
            width: 100%;
            padding: 12px;
            color: #172033;
            background: #f8fafc;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font: inherit;
        }
        select:focus, input:focus { outline: 2px solid #818cf8; border-color: #4f46e5; }
        .submit { grid-column: 1 / -1; margin-top: 8px; }
        button {
            width: 100%;
            padding: 14px;
            border: 0;
            border-radius: 10px;
            color: white;
            background: #4f46e5;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
        }
        button:hover { background: #3730a3; }
        .result {
            margin-top: 24px;
            padding: 16px;
            text-align: center;
            color: #166534;
            background: #dcfce7;
            border-radius: 10px;
        }
        @media (max-width: 600px) {
            .card { padding: 24px 18px; }
            form { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <main class="container">
        <section class="card">
            <a class="back" href="{{ url_for('index') }}">← Home</a>
            <h1>Student Exam Performance</h1>
            <p class="intro">Enter the student's details to estimate their mathematics score.</p>
            <form action="{{ url_for('predict_datapoint') }}" method="post">
        <div class="mb-3">
            <label class="form-label">Gender</label>
            <select class="form-control" name="gender" placeholder="Enter you Gender" required>
                <option class="placeholder" selected disabled value="">Select your Gender</option>
                <option value="male">
                    Male
                </option>
                <option value="female">
                    Female
                </option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Race or Ethnicity</label>
            <select class="form-control" name="ethnicity" placeholder="Enter you ethnicity" required>
                <option class="placeholder" selected disabled value="">Select Ethnicity</option>
                <option value="group A">
                    Group A
                </option>
                <option value="group B">
                    Group B
                </option>
                <option value="group C">
                    Group C
                </option>
                <option value="group D">
                    Group D
                </option>
                <option value="group E">
                    Group E
                </option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Parental Level of Education</label>
            <select class="form-control" name="parental_level_of_education"
                placeholder="Enter you Parent Education" required>
                <option class="placeholder" selected disabled value="">Select Parent Education</option>
                <option value="associate's degree">
                    associate's degree
                </option>
                <option value="bachelor's degree">
                    bachelor's degree
                </option>
                <option value="high school">
                    high school
                </option>
                <option value="master's degree">
                    master's degree
                </option>
                <option value="some college">
                    some college
                </option>
                <option value="some high school">
                    some high school
                </option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Lunch Type</label>
            <select class="form-control" name="lunch" placeholder="Enter you Lunch" required>
                <option class="placeholder" selected disabled value="">Select Lunch Type</option>
                <option value="free/reduced">
                    free/reduced
                </option>
                <option value="standard">
                    standard
                </option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Test preparation Course</label>
            <select class="form-control" name="test_preparation_course" placeholder="Enter you Course"
                required>
                <option class="placeholder" selected disabled value="">Select Test_course</option>
                <option value="none">
                    None
                </option>
                <option value="completed">
                    Completed
                </option>
            </select>
        </div>
        <div class="field">
            <label for="reading_score">Reading Score (0–100)</label>
            <input id="reading_score" type="number" name="reading_score"
                placeholder="Enter reading score" min="0" max="100" required />
        </div>
        <div class="field">
            <label for="writing_score">Writing Score (0–100)</label>
            <input id="writing_score" type="number" name="writing_score"
                placeholder="Enter writing score" min="0" max="100" required />
        </div>
        <div class="submit">
            <button type="submit">Predict Math Score</button>
        </div>
            </form>
            {% if results is defined %}
            <div class="result">Predicted math score: <strong>{{ results }}</strong></div>
            {% endif %}
        </section>
    </main>
</body>
</html>
