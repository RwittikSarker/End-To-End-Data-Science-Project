<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Student Performance Predictor</title>
	<style>
		* { box-sizing: border-box; }
		body {
			min-height: 100vh;
			margin: 0;
			display: grid;
			place-items: center;
			padding: 24px;
			font-family: Arial, sans-serif;
			color: #172033;
			background: linear-gradient(135deg, #e0f2fe, #eef2ff);
		}
		.card {
			max-width: 620px;
			padding: 52px 42px;
			text-align: center;
			background: rgba(255, 255, 255, .94);
			border-radius: 24px;
			box-shadow: 0 20px 55px rgba(30, 64, 175, .16);
		}
		.icon { font-size: 3rem; }
		h1 { margin: 16px 0 12px; font-size: clamp(2rem, 5vw, 3.2rem); }
		p { margin: 0 auto 30px; color: #64748b; line-height: 1.7; }
		.button {
			display: inline-block;
			padding: 14px 24px;
			color: #fff;
			font-weight: bold;
			text-decoration: none;
			background: #4f46e5;
			border-radius: 10px;
			transition: .2s ease;
		}
		.button:hover { background: #3730a3; transform: translateY(-2px); }
	</style>
</head>
<body>
	<main class="card">
		<div class="icon">📊</div>
		<h1>Student Performance Predictor</h1>
		<p>Estimate a student's mathematics score using their academic and demographic information.</p>
		<a class="button" href="{{ url_for('predict_datapoint') }}">Start a Prediction →</a>
	</main>
</body>
</html>
